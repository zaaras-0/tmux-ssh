# --- RESETARE TOTALĂ ---
unbind-key -a

# --- PREFIX (Ctrl + Space) ---
set -g prefix C-Space
bind-key C-Space send-prefix

# --- LINIA DE COMANDĂ & RELOAD ---
bind-key : command-prompt
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- NAVIGARE PANE-URI (FĂRĂ PREFIX: Alt + Săgeți) ---
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up select-pane -U
bind-key -n M-Down select-pane -D

# --- REDIMENSIONARE PANE-URI (FĂRĂ PREFIX: Ctrl + Săgeți) ---
bind-key -n C-Left resize-pane -L 5
bind-key -n C-Right resize-pane -R 5
bind-key -n C-Up resize-pane -U 5
bind-key -n C-Down resize-pane -D 5

# --- MUTARE PANE-URI (FĂRĂ PREFIX: Shift + Săgeți) ---
bind-key -n S-Left swap-pane -d -t '{left-of}'
bind-key -n S-Right swap-pane -d -t '{right-of}'
bind-key -n S-Up swap-pane -d -t '{above}'
bind-key -n S-Down swap-pane -d -t '{below}'

# --- SPLIT PANE-URI (CU PREFIX: Ctrl + Space + Săgeți) ---
bind-key Right split-window -h -c "#{pane_current_path}"
bind-key Left  split-window -h -b -c "#{pane_current_path}"
bind-key Down  split-window -v -c "#{pane_current_path}"
bind-key Up    split-window -v -b -c "#{pane_current_path}"

# --- MANAGEMENT INTERACTIV (CU PREFIX: Ctrl + Space) ---
bind-key n new-window -c "#{pane_current_path}"
bind-key w choose-tree -Zw      # Interactiv Windows + Preview
bind-key Q kill-window
bind-key q kill-pane
bind-key d detach-client

# --- SETĂRI COMPORTAMENT ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
unbind-key -n MouseDragEnd1Pane

unbind-key -T copy-mode-vi MouseDragEnd1Pane
unbind-key -T copy-mode MouseDragEnd1Pane

# --- DESIGN MINIMALIST ---
set -g status-style bg=default,fg=white
set -g status-left '#[fg=green][#S] '
set -g status-right '#[fg=yellow]%H:%M '

bind-key ? list-keys -T prefix
# --- RESETARE TOTALĂ ---
unbind-key -a

# --- PREFIX (Ctrl + Space) ---
set -g prefix C-Space
bind-key C-Space send-prefix

# --- LINIA DE COMANDĂ & RELOAD ---
bind-key : command-prompt
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- NAVIGARE PANE-URI (FĂRĂ PREFIX: Alt + Săgeți) ---
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up select-pane -U
bind-key -n M-Down select-pane -D

# --- REDIMENSIONARE PANE-URI (FĂRĂ PREFIX: Ctrl + Săgeți) ---
bind-key -n C-Left resize-pane -L 5
bind-key -n C-Right resize-pane -R 5
bind-key -n C-Up resize-pane -U 5
bind-key -n C-Down resize-pane -D 5

# --- MUTARE PANE-URI (FĂRĂ PREFIX: Shift + Săgeți) ---
bind-key -n S-Left swap-pane -d -t '{left-of}'
bind-key -n S-Right swap-pane -d -t '{right-of}'
bind-key -n S-Up swap-pane -d -t '{above}'
bind-key -n S-Down swap-pane -d -t '{below}'

# --- SPLIT PANE-URI (CU PREFIX: Ctrl + Space + Săgeți) ---
bind-key Right split-window -h -c "#{pane_current_path}"
bind-key Left  split-window -h -b -c "#{pane_current_path}"
bind-key Down  split-window -v -c "#{pane_current_path}"
bind-key Up    split-window -v -b -c "#{pane_current_path}"

# --- MANAGEMENT INTERACTIV (CU PREFIX: Ctrl + Space) ---
bind-key n new-window -c "#{pane_current_path}"
bind-key w choose-tree -Zw      # Interactiv Windows + Preview
bind-key Q kill-window
bind-key q kill-pane
bind-key d detach-client

# --- RESTAURARE COMPORTAMENT MOUSE (DEFAULT) ---
set -g mouse on

# Permite scroll-ul cu rotița (re-bind după unbind -a)
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -et='"
bind-key -n WheelDownPane send-keys -M

# Permite selecția cu mouse-ul (Face split-ul vertical să funcționeze corect)
bind-key -n MouseDrag1Pane copy-mode -M

# INTEGRARE CLIPBOARD (Ubuntu/Linux)
# Când lași click-ul, copiază în buffer-ul tmux ȘI în clipboard-ul sistemului
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# --- SETĂRI COMPORTAMENT ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- DESIGN MINIMALIST ---
set -g status-style bg=default,fg=white
set -g status-left '#[fg=green][#S] '
set -g status-right '#[fg=yellow]%H:%M '

bind-key ? list-keys -T prefix

setw -g mode-keys vi

# Permite intrarea în copy-mode cu Prefix + [ (pentru că unbind -a l-a șters)
bind-key [ copy-mode

# Mapări pentru selecție ca în Vim (opțional, dar recomandat)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# --- zbw (Bitwarden SSH) configuration ---
# s/S (Servers) - Deschide selectorul în POPUP (centrat)
bind-key s display-popup -E -w 80% -h 65% "/home/zaaras/.local/bin/zbw"
bind-key S display-popup -E -w 80% -h 65% "/home/zaaras/.local/bin/zbw"
bind-key g display-popup -E -w 80% -h 65% "/home/zaaras/.local/bin/zbw snippets"
bind-key G display-popup -E -w 80% -h 65% "/home/zaaras/.local/bin/zbw snippets"
bind-key "/" command-prompt -p "Search Vault:" "display-popup -E -w 80% -h 65% '/home/zaaras/.local/bin/zbw search \"%%\"'"
bind-key -n C-p run-shell "/home/zaaras/.local/bin/tmux-insert-pass"
bind-key p run-shell "/home/zaaras/.local/bin/tmux-insert-pass"

# --- stop ddetaching on session close ---
set -g detach-on-destroy off
